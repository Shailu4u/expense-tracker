<body class="bg-background text-on-background font-body-base min-h-screen pb-24">
<!-- TopAppBar -->
<header class="flex justify-between items-center w-full px-4 h-16 sticky top-0 z-50 bg-slate-50/90 dark:bg-slate-950/90 backdrop-blur-md border-b border-slate-200 dark:border-slate-800">

</button>
<div class="text-lg font-bold text-teal-800 dark:text-teal-400 font-headline-md tracking-tight">Add Record</div>
<button class="w-10 h-10 flex items-center justify-center text-slate-500 hover:bg-slate-200/50 rounded-full active:scale-95 transition-all duration-200">
<span class="material-symbols-outlined">help</span>
</button>
</header>
<main class="px-container-margin py-lg max-w-lg mx-auto flex flex-col gap-xl">
<!-- Segmented Control -->
<div class="bg-surface-container-high rounded-lg p-1 flex w-full">
<button class="flex-1 py-2 text-center rounded-md bg-surface text-on-surface shadow-sm font-label-caps font-semibold">Expense</button>
<button class="flex-1 py-2 text-center rounded-md text-on-surface-variant font-label-caps font-semibold hover:bg-surface-variant transition-colors">Income</button>
</div>

<section class="flex flex-col items-center justify-center py-4">
<div class="flex items-center text-currency-display font-currency-display text-primary-container">
<span class="mr-2">₹</span>
<input autofocus="" class="bg-transparent border-none outline-none text-center w-full max-w-[200px] text-currency-display p-0 m-0 focus:ring-0 placeholder:text-outline-variant" placeholder="0.00" type="number"/>
</div>
<div class="text-body-sm font-body-sm text-on-surface-variant mt-2 flex items-center gap-1">
<span class="material-symbols-outlined text-[16px]">calendar_today</span>
<span>Today, 10:42 AM</span>
</div>
</section>
<!-- Payment Mode Chips -->
<section class="flex flex-col gap-base">
<h3 class="font-label-caps text-label-caps text-on-surface-variant uppercase">Payment Mode</h3>
<div class="flex gap-sm overflow-x-auto hide-scrollbar pb-2">
<button class="px-4 py-2 rounded-full border border-primary-container bg-primary-container/10 text-primary-container font-label-caps font-semibold whitespace-nowrap flex items-center gap-1">

<button class="px-4 py-2 rounded-full border border-outline-variant bg-surface text-on-surface-variant font-label-caps font-semibold whitespace-nowrap hover:bg-surface-variant transition-colors">

                </button>
<button class="px-4 py-2 rounded-full border border-outline-variant bg-surface text-on-surface-variant font-label-caps font-semibold whitespace-nowrap hover:bg-surface-variant transition-colors">

<button class="px-4 py-2 rounded-full border border-outline-variant bg-surface text-on-surface-variant font-label-caps font-semibold whitespace-nowrap hover:bg-surface-variant transition-colors">

                </button>
</div>
</section>

<input class="w-full bg-surface-container-low border border-surface-container-highest rounded-lg py-3 pl-10 pr-4 font-body-base text-body-base focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all outline-none" placeholder="Merchant name (e.g., Swiggy)" type="text"/>
</div>

<button class="w-full h-12 bg-primary-container text-on-primary rounded-lg font-headline-md text-body-base flex items-center justify-center gap-2 hover:bg-surface-tint active:scale-[0.98] transition-all shadow-md">
