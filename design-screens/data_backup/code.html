<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Export &amp; Backup - RupeeSafe</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>

        }

                        "on-tertiary-fixed-variant": "#723522",
                        "on-error-container": "#93000a",
                        "tertiary": "#703321",
                        "secondary-fixed": "#e2e2e2",
                        "surface-variant": "#e3e2e2",
                        "surface-bright": "#fbf9f9",
                        "surface-container": "#efeded",
                        "tertiary-fixed-dim": "#ffb59f",

                        "on-primary-fixed-variant": "#005046",
                        "inverse-surface": "#303031",
                        "surface-container-lowest": "#ffffff",
                        "primary-fixed": "#a0f2e1",
                        "secondary": "#5d5f5e",
                        "inverse-on-surface": "#f2f0f0",
                        "primary-fixed-dim": "#84d5c5",
                        "tertiary-fixed": "#ffdbd1",
                        "surface": "#fbf9f9",

                        "secondary-fixed-dim": "#c6c7c6"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xs": "4px",
                        "base": "8px",
                        "md": "16px",
                        "lg": "24px",
                        "xl": "32px",
                        "container-margin": "20px",
                        "sm": "12px",
                        "gutter": "12px"
                    },
                    "fontFamily": {
                        "body-sm": ["Inter"],
                        "display-lg": ["Inter"],

                    "fontSize": {

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-base text-body-base antialiased min-h-screen flex flex-col selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="bg-slate-50/90 dark:bg-slate-950/90 backdrop-blur-md font-inter tracking-tight text-slate-900 dark:text-slate-100 docked full-width top-0 border-b border-slate-200 dark:border-slate-800 flat no shadows flex justify-between items-center w-full px-4 h-16 sticky top-0 z-50">
<button class="flex items-center justify-center w-10 h-10 hover:bg-slate-200/50 dark:hover:bg-slate-800/50 rounded-full active:scale-95 transition-all duration-200 text-slate-500 dark:text-slate-400">
<span class="material-symbols-outlined">menu</span>
</button>
<h1 class="text-lg font-bold text-teal-800 dark:text-teal-400">RupeeSafe</h1>
<button class="flex items-center justify-center w-10 h-10 hover:bg-slate-200/50 dark:hover:bg-slate-800/50 rounded-full active:scale-95 transition-all duration-200">
<div class="w-8 h-8 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center text-sm font-medium">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">person</span>
</div>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 px-container-margin py-lg pb-[100px] flex flex-col gap-xl">
<!-- Hero / Context Section -->
<section class="flex flex-col items-center text-center gap-sm mt-md">
<div class="w-16 h-16 rounded-full bg-surface-container-high flex items-center justify-center text-primary mb-sm shadow-[0_4px_20px_rgba(0,0,0,0.04)] border border-outline-variant/30">
<span class="material-symbols-outlined text-[32px]">security</span>
</div>
<h2 class="font-headline-md text-headline-md text-on-surface">Export &amp; Backup</h2>
<p class="font-body-base text-body-base text-on-surface-variant max-w-[280px]">Your data, your control. Export or backup anytime.</p>
<div class="mt-xs inline-flex items-center gap-xs bg-surface-container rounded-full px-sm py-xs border border-outline-variant/50">
<span class="material-symbols-outlined text-[16px] text-outline">database</span>
<span class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider">1.2 MB used</span>
</div>
</section>
<!-- Primary Actions Group -->
<section class="flex flex-col gap-base">
<!-- Primary Action -->
<button class="w-full h-14 bg-primary text-on-primary rounded-xl px-md flex items-center justify-between shadow-[0_4px_12px_rgba(0,79,69,0.15)] active:scale-[0.98] transition-transform duration-150">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined">download</span>
<span class="font-body-base text-body-base font-medium">Export as CSV</span>
</div>
<span class="material-symbols-outlined text-on-primary/70">chevron_right</span>
</button>
<!-- Secondary Actions -->
<div class="flex flex-col gap-xs bg-surface rounded-xl border border-outline-variant shadow-[0_4px_20px_rgba(0,0,0,0.02)] overflow-hidden">
<button class="w-full h-[60px] bg-transparent text-on-surface px-md flex items-center justify-between hover:bg-surface-container-low active:bg-surface-container transition-colors border-b border-outline-variant/30">
<div class="flex items-center gap-sm">
<div class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-[20px]">save</span>
</div>
<span class="font-body-base text-body-base">Create Local Backup</span>
</div>
</button>
<button class="w-full h-[60px] bg-transparent text-on-surface px-md flex items-center justify-between hover:bg-surface-container-low active:bg-surface-container transition-colors">
<div class="flex items-center gap-sm">
<div class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-[20px]">restore</span>
</div>
<span class="font-body-base text-body-base">Restore from File</span>
</div>
</button>
</div>
</section>
<!-- Danger Zone Section -->
<section class="flex flex-col gap-base mt-auto">
<h3 class="font-label-caps text-label-caps text-outline uppercase tracking-wider px-xs">Data Management</h3>
<button class="w-full h-14 bg-transparent border border-error/20 text-error rounded-xl px-md flex items-center justify-center gap-sm hover:bg-error-container/50 active:bg-error-container transition-colors">
<span class="material-symbols-outlined text-[20px]">delete</span>
<span class="font-body-base text-body-base font-medium">Delete All Data</span>
</button>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full h-20 z-50 flex justify-around items-center px-4 pb-safe bg-white dark:bg-slate-900 border-t border-slate-100 dark:border-slate-800 shadow-[0_-4px_20px_rgba(0,0,0,0.03)] docked full-width bottom-0 rounded-t-xl">
<button class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:text-teal-600 dark:hover:text-teal-200 active:scale-90 transition-transform duration-150 w-16 h-full gap-1">
<span class="material-symbols-outlined text-[24px]">home</span>
<span class="text-[11px] font-medium font-inter">Home</span>
</button>
<button class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:text-teal-600 dark:hover:text-teal-200 active:scale-90 transition-transform duration-150 w-16 h-full gap-1">
<span class="material-symbols-outlined text-[24px]">receipt_long</span>
<span class="text-[11px] font-medium font-inter">History</span>
</button>
<button class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:text-teal-600 dark:hover:text-teal-200 active:scale-90 transition-transform duration-150 w-16 h-full gap-1">
<span class="material-symbols-outlined text-[24px]">add_circle</span>
<span class="text-[11px] font-medium font-inter">Add</span>
</button>
<button class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:text-teal-600 dark:hover:text-teal-200 active:scale-90 transition-transform duration-150 w-16 h-full gap-1">
<span class="material-symbols-outlined text-[24px]">account_balance_wallet</span>
<span class="text-[11px] font-medium font-inter">Budgets</span>
</button>
<!-- Active Tab: Settings (Maps to Export/Backup) -->
<button class="flex flex-col items-center justify-center text-teal-800 dark:text-teal-300 font-bold hover:text-teal-600 dark:hover:text-teal-200 active:scale-90 transition-transform duration-150 w-16 h-full gap-1">
<span class="material-symbols-outlined text-[24px]" style="font-variation-settings: 'FILL' 1;">settings</span>
<span class="text-[11px] font-medium font-inter">Settings</span>
</button>
</nav>
</body></html>
