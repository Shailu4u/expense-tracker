<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>RupeeSafe - Welcome</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-surface-variant": "#3e4946",
                        "on-primary": "#ffffff",
                        "on-background": "#1b1c1c",
                        "surface-container-highest": "#e3e2e2",
                        "on-secondary-fixed-variant": "#454747",
                        "on-primary-fixed": "#00201b",
                        "error-container": "#ffdad6",
                        "error": "#ba1a1a",
                        "primary": "#004f45",
                        "on-tertiary-fixed": "#3a0b01",
                        "on-tertiary-container": "#ffcabb",
                        "on-primary-container": "#94e5d5",
                        "on-tertiary-fixed-variant": "#723522",
                        "on-error-container": "#93000a",
                        "tertiary": "#703321",
                        "secondary-fixed": "#e2e2e2",
                        "surface-variant": "#e3e2e2",
                        "surface-bright": "#fbf9f9",
                        "surface-container": "#efeded",
                        "tertiary-fixed-dim": "#ffb59f",
                        "surface-container-high": "#e9e8e7",
                        "secondary-container": "#dcdddc",
                        "on-secondary-container": "#5f6161",
                        "surface-tint": "#046b5e",
                        "inverse-primary": "#84d5c5",
                        "background": "#fbf9f9",
                        "outline-variant": "#bec9c5",
                        "primary-container": "#00695c",
                        "outline": "#6e7976",
                        "surface-container-low": "#f5f3f3",
                        "on-error": "#ffffff",
                        "surface-dim": "#dbdad9",
                        "on-secondary": "#ffffff",
                        "on-primary-fixed-variant": "#005046",
                        "inverse-surface": "#303031",
                        "surface-container-lowest": "#ffffff",
                        "primary-fixed": "#a0f2e1",
                        "secondary": "#5d5f5e",
                        "inverse-on-surface": "#f2f0f0",
                        "primary-fixed-dim": "#84d5c5",
                        "tertiary-fixed": "#ffdbd1",
                        "surface": "#fbf9f9",
                        "on-surface": "#1b1c1c",
                        "tertiary-container": "#8d4a36",
                        "on-secondary-fixed": "#1a1c1c",
                        "on-tertiary": "#ffffff",
                        "secondary-fixed-dim": "#c6c7c6"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xs": "4px",
                        "base": "8px",
                        "md": "16px",
                        "lg": "24px",
                        "xl": "32px",
                        "container-margin": "20px",
                        "sm": "12px",
                        "gutter": "12px"
                    },
                    "fontFamily": {
                        "body-sm": ["Inter"],
                        "display-lg": ["Inter"],
                        "label-caps": ["Inter"],
                        "currency-display": ["Inter"],
                        "body-base": ["Inter"],
                        "headline-md": ["Inter"]
                    },
                    "fontSize": {
                        "body-sm": ["14px", { "lineHeight": "1.4", "fontWeight": "400" }],
                        "display-lg": ["36px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "label-caps": ["12px", { "lineHeight": "1.2", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "currency-display": ["32px", { "lineHeight": "1", "fontWeight": "700" }],
                        "body-base": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col selection:bg-primary-container selection:text-on-primary-container">
<!-- Abstract Hero Background Decor -->
<div class="absolute top-0 left-0 w-full h-[353px] overflow-hidden -z-10 pointer-events-none">
<div class="absolute -top-[20%] -left-[10%] w-[70%] h-[120%] bg-gradient-to-br from-primary-fixed-dim/30 to-transparent blur-[80px] rounded-full"></div>
<div class="absolute top-[10%] -right-[20%] w-[60%] h-[100%] bg-gradient-to-bl from-tertiary-fixed/20 to-transparent blur-[60px] rounded-full"></div>
</div>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col px-container-margin pt-xl pb-lg max-w-md mx-auto w-full relative z-10">
<!-- Header Section -->
<header class="flex flex-col items-center text-center mt-lg mb-xl">
<div class="w-16 h-16 rounded-2xl bg-primary-container flex items-center justify-center mb-md shadow-[0_8px_30px_rgba(0,105,92,0.2)]">
<span class="material-symbols-outlined text-[32px] text-on-primary" data-icon="account_balance_wallet" style="font-variation-settings: 'FILL' 1;">account_balance_wallet</span>
</div>
<h1 class="font-display-lg text-display-lg text-primary mb-xs">RupeeSafe</h1>
<p class="font-body-base text-body-base text-on-surface-variant max-w-[280px]">Financial Zen, simplified for you.</p>
</header>
<!-- Bento Grid Configuration Area -->
<div class="flex flex-col gap-sm flex-grow">
<!-- Privacy Highlight Card (Full Width) -->
<div class="bg-surface-container-lowest rounded-xl p-md border border-outline-variant/30 shadow-[0_4px_20px_rgba(0,0,0,0.03)] flex flex-col gap-sm relative overflow-hidden group">
<div class="absolute top-0 right-0 w-32 h-32 bg-primary-fixed/20 rounded-bl-full -z-10 transition-transform duration-500 group-hover:scale-110"></div>
<div class="flex items-center gap-sm text-primary">
<span class="material-symbols-outlined" data-icon="shield_lock">shield_lock</span>
<span class="font-label-caps text-label-caps tracking-widest text-primary-container">PRIVACY FIRST</span>
</div>
<p class="font-body-base text-body-base text-on-surface">Your data stays on your phone. No accounts. No cloud. Fully offline.</p>
</div>
<!-- Configuration Grid (2 Columns) -->
<div class="grid grid-cols-2 gap-sm">
<!-- Budget Card -->
<div class="bg-surface-container-lowest rounded-xl p-md border border-outline-variant/30 shadow-[0_4px_20px_rgba(0,0,0,0.02)] flex flex-col gap-xs justify-between min-h-[120px]">
<div class="w-10 h-10 rounded-full bg-secondary-container/50 flex items-center justify-center text-on-secondary-container">
<span class="material-symbols-outlined" data-icon="pie_chart">pie_chart</span>
</div>
<span class="font-body-sm text-body-sm text-on-surface font-medium leading-tight">Set monthly budget</span>
</div>
<!-- Categories Card -->
<div class="bg-surface-container-lowest rounded-xl p-md border border-outline-variant/30 shadow-[0_4px_20px_rgba(0,0,0,0.02)] flex flex-col gap-xs justify-between min-h-[120px]">
<div class="w-10 h-10 rounded-full bg-tertiary-container/20 flex items-center justify-center text-tertiary">
<span class="material-symbols-outlined" data-icon="category">category</span>
</div>
<span class="font-body-sm text-body-sm text-on-surface font-medium leading-tight">Choose default categories</span>
</div>
</div>
<!-- App Lock Card (Full Width) -->
<div class="bg-surface-container-lowest rounded-xl p-md border border-outline-variant/30 shadow-[0_4px_20px_rgba(0,0,0,0.02)] flex items-center justify-between">
<div class="flex items-center gap-sm">
<div class="w-10 h-10 rounded-full bg-surface-variant flex items-center justify-center text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="fingerprint">fingerprint</span>
</div>
<span class="font-body-base text-body-base text-on-surface font-medium">Enable app lock</span>
</div>
<!-- Stylized Toggle -->
<div class="w-12 h-6 bg-surface-container-highest rounded-full relative p-1">
<div class="w-4 h-4 bg-on-surface-variant rounded-full absolute left-1"></div>
</div>
</div>
</div>
<!-- Sticky Bottom CTA Area -->
<div class="mt-xl pt-md flex flex-col gap-sm w-full sticky bottom-0 bg-gradient-to-t from-background via-background to-transparent pb-md">
<button class="w-full h-14 bg-primary text-on-primary rounded-xl font-body-base text-body-base font-semibold shadow-[0_4px_12px_rgba(0,79,69,0.2)] hover:bg-primary-container active:scale-[0.98] transition-all flex items-center justify-center gap-xs">
                Start tracking
                <span class="material-symbols-outlined text-[20px]" data-icon="arrow_forward">arrow_forward</span>
</button>
<button class="w-full h-14 bg-transparent border border-outline text-on-surface-variant rounded-xl font-body-base text-body-base font-medium hover:bg-surface-container-low active:scale-[0.98] transition-all">
                Configure first
            </button>
</div>
</main>
</body></html>
